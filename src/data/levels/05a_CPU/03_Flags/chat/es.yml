main:
  messages:
  - como viste en el capítulo de Ensamblador, también existe un 🏁  Registro de Banderas que representa el estado del procesador
  - |-
    es un registro de 8 bits, en el cual cada bit tiene un significado especial
     ```raw _______________________________```
    ```raw | 7 | 6 | 5 | 4 | 3 | 2 | 1 | 0 |```
    ```raw |---|---|---|---|---|---|---|---|```
    ```raw |``` ~N~ ```raw |``` ~V~ ```raw |``` ```raw 1``` ```raw |``` ```raw b``` ```raw |``` ~D~ ```raw |``` ~I~ ```raw |``` ~Z~ ```raw |``` ~C~ ```raw |```
     ```raw ‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾```
  - ya cubrimos ~C~ ("Carry") y ~Z~ ("Zero") anteriormente, y hablaremos de los demás cuando empecemos a programar instrucciones de CPU
  - todas las banderas se representan con una letra en mayúscula
  responses:
  - no <todas> 😑 [notall]

notall:
  messages:
  - todas, sí, ¡los bits 5 y 4 no son banderas!
  - el bit 5 es siempre 1
  - el bit 4 ("b")... depende... de... cosas - asume que es 0 por ahora 😂
  responses:
  - está bien, ¿qué debería hacer? [exercise]

exercise:
  messages:
  - 📚  crea una clase 🏁  `FlagsRegister` con 6 propiedades booleanas (llamadas `c`, `z`, `i`, `d`, `v` y `n`)
  - inicialízalas en ```javascript false```
  - |-
    📚  luego implementa, siguiendo la tabla anterior:
    **getValue()**:
      **->** tiene que retornar un número de 8 bits con todas las banderas
    **setValue(value)**:
      **->** tiene que asignar todas las banderas a partir del número de 8 bits que recibe
  - p. ej. con `i` y `v` encendidas, ```javascript getValue()``` debería retornar ```javascript 0b01100100```
  - y ```javascript setValue(0b00000010)``` debería poner todos los booleanos en ```javascript false```, menos `z`
  responses:
  - (*) necesito un poco de ayuda 📐 [bits]
  - ✅  ya tengo la clase [nowwhat]


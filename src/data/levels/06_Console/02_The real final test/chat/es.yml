---
main:
  run: |
    set((m) => m.chat.winOnEnd = true);
  messages:
  - ¡la prueba final <real> es jugar un juego de principio a fin!
  - juguemos un juego
  - esta vez, usando tu emulador 🤯
  - |-
    se llama 🤖 🧗  ~Robo-Ninja Climb~
    <{screenshot.png;30x30}>
  - aquí controlas a <Robo-Ninja>, practicando sus habilidades de escalar y saltar antes de salir a salvar el mundo
  - si lo completas, te enviaré el <archivo ROM>
  - en el formato ~*.neees~
  responses:
  - suena fácil 🙌 [play]

play:
  run-after-messages: |
    {{Top}}.runner.setIntegration("RoboNinjaClimb");
    {{Top}}.loadROM("/roms/.all/RoboNinjaClimb.neees");
  messages:
  - en realidad, morirás muchísimo
  - si resulta ser demasiado...
  - bueno, ¡tú creaste el emulador!
  - así que siempre puedes intentar <hackear el juego> 😉
  - el código debe estar almacenando cosas como la <salud> en alguna parte de la WRAM
  - solo <llega al final>, como puedas 👀
  - __(solo no uses __<save states>__, ¡eso es aburrido!)__
  events:
  - roboninjaclimb-end [finish]

finish:
  run: |
    const directory = `${Drive.ROMS_DIR}`;
    filesystem.mkdirp(directory);

    ["RoboNinjaClimb.neees"].forEach((file) => {
      filesystem.cp(`${Drive.ALLROMS_DIR}/${file}`, `${directory}/${file}`);
    });

    if ({{Top}}.runner.didUseSaveState) {
      $.goTo("savestate-yes");
    } else {
      $.goTo("savestate-no");
    }
  messages: []
  responses: []

savestate-yes:
  run: |
    window.EmuDevz.achievements.unlock("emulator-robo-ninja-cheater")
  messages:
  - ¿usaste... <save states>?!
  - eso es trampa 😅
  - no era el hackeo que tenía en mente, ¡pero está bien!
  - "<! ROM recibida: 📄  /roms/RoboNinjaClimb.neees"
  - como prometí, puse la ROM en tu directorio 📁  ~/roms~
  - ¡disfruta!
  responses:
  - ▶️  continuar [end]


savestate-no:
  run: |
    window.EmuDevz.achievements.unlock("emulator-robo-ninja-player")
  messages:
  - ¡increíble! jugaste como un dios... o hackeaste como uno 🤣
  - "<! ROM recibida: 📄  /roms/RoboNinjaClimb.neees"
  - como prometí, puse la ROM en tu directorio 📁  ~/roms~
  - ¡disfruta tu victoria! te la ganaste 🚀
  responses:
  - ▶️  continuar [end]


main:
  messages:
  - "los Canales de Pulso pueden silenciarse de mГәltiples formas:"
  - рҹ”Ү  cuando los juegos silencian el canal con una escritura a рҹҺӣпёҸ  APUControl
  - рҹ“Ҹ  cuando el contador de longitud es 0
  - рҹ§№  cuando la unidad de barrido estГЎ silenciada
  - рҹ”Ҳ  cuando el volumen del canal es 0
  - hasta ahora, solo cubrimos la Гәltima situaciГіn
  - (mГЎs o menos, todavГӯa tenemos que ocuparnos de la envolvente, ВЎpero eso vendrГЎ despuГ©s!)
  - "nuestro prГіximo objetivo es manejar las dos primeras: silencios de canal y el contador de longitud"
  responses:
  - Вҝy quГ© es un contador de longitud? [length]

length:
  messages:
  - ВЎes lo que usa la APU para manejar la <longitud> de las notas!
  - los juegos <cargan> su valor inicial para indicar la longitud de la nota
  - luego ese valor se decrementa cada half frame
  - ВЎy cuando llega a 0, el canal se silencia! рҹӨҗ
  responses:
  - (*) ВҝcГіmo hace un juego para cargar su valor? [load]
  - (*) Вҝsiempre decrementa su valor en los half frames? [decrement]
  - vamos a programarlo [exercise]

load:
  messages:
  - escribe en un registro que tiene <Length Counter Load> (o su forma abreviada, <LCL>) en su nombre
  - en el caso de los Canales de Pulso, es рҹ•ӣ  PulseTimerHighLCL, donde los 5 bits altos son el <Гӯndice de longitud>
  - ese Гӯndice apunta a una tabla fija con todas las longitudes disponibles, revisa рҹ“„  ~/lib/apu/noteLengths.js~
  - <{length_counter_load.png}>
  responses:
  - Вҝy si un juego necesita una longitud que no estГЎ en la lista? [otherlengths]

otherlengths:
  messages:
  - ВЎeso no estГЎ soportado!
  - al menos con este tipo de contador de longitud
  - es por eso que los juegos no suelen usar este mГ©todo y terminan cambiando el volumen a mano, o usando la envolvente
  responses:
  - ...length

decrement:
  messages:
  - solo si su <bandera de detenciГіn> (<halt>) no estГЎ encendida
  - esa serГӯa el bit <L> en рҹҹҰ  PulseControl
  - <{length_counter_halt.png;30x30}>
  responses:
  - ...length

exercise:
  messages:
  - |-
    рҹ“ҡ  crea una clase рҹ“Ҹ  `LengthCounter` con lo siguiente:
    **constructor()**:
      **->** llama a ```javascript this.reset()```
    **reset()**:
      **->** asigna ```javascript this.counter = 0```
    **isActive()**:
      **->** retorna si ```javascript this.counter``` es mayor a 0 o no
    **clock(isEnabled, isHalted)**:
      **->** si `!isEnabled`:
        **->** llama a ```javascript this.reset()```
      **->** si no:
        **->** si ```javascript this.isActive()``` y `!isHalted`:
          **->** disminuye el contador
  - |-
    рҹ“ҡ  en рҹҹҰ  `PulseChannel`:
    **->** importa esa clase y agrega una propiedad `lengthCounter` con una nueva instancia
    **->** modifica **sample()** para que si ```javascript !this.isEnabled()``` o el contador de longitud no estГЎ activo, retorne el Гәltimo sample generado, sin cambiar nada
    **->** agrega los siguientes mГ©todos:
    **quarterFrame()**:
      **[!]** dГ©jalo vacГӯo por ahora
    **halfFrame()**:
      **->** llama al mГ©todo `clock(...)` del contador de longitud
        (usa ```javascript this.isEnabled()``` como primer argumento)
        (para la bandera de detenciГіn, busca `envelopeLoopOrLengthCounterHalt` en el registro рҹҹҰ  PulseControl)
  - |-
    рҹ“ҡ  en рҹ”Ҡ  `APU`:
    **onQuarterFrameClock()**:
      **->** llama a `quarterFrame()` en las dos instancias de canal pulso
    **onHalfFrameClock()**:
      **->** llama a `halfFrame()` en las dos instancias de canal pulso
  - |-
    рҹ“ҡ  implementa en рҹ•ӣ  `PulseTimerHighLCL`:
    **onLoad()**:
      **->** usa ```javascript this.addField(...)``` para definir un campo `lengthCounterLoad` de 5 bits desde el bit 3
    **onWrite(value)**:
      **->** __mantГ©n el comportamiento existente__
      **->** determina la nueva longitud accediendo al array `noteLengths` con el Гӯndice ```javascript this.lengthCounterLoad```
        (usa рҹ“„  ~/lib/apu/noteLengths.js~ para obtener el array)
      **->** asigna el nuevo valor a la propiedad `counter` del contador de longitud
  - |-
    рҹ“ҡ  implementa en рҹҺӣпёҸ  `APUControl`:
    **onWrite(value)**:
      **->** __mantГ©n el comportamiento existente__
      **->** si `!this.enablePulse1`:
        **->** reinicia el contador de longitud de <Pulse 1>
      **->** si `!this.enablePulse2`:
        **->** reinicia el contador de longitud de <Pulse 2>
  responses: []

---
main:
  run: |
    set((m) => m.chat.winOnEnd = true);
  messages:
  - <! 📹  Entrando en video chat...
  - hey,
  - juguemos un juego
  - |-
    se llama 🙌 ☁️  ~Falling~
    <{screenshot.png;30x30}>
  - un simple juego de <caída infinita> donde esquivas obstáculos y recoges objetos
  - si lo completas, te enviaré el <archivo ROM>
  - en el formato ~*.neees~
  responses:
  - hmm... ¿y cómo gano? [play]

play:
  run: |
    {{Right}}.stream.zoom();
    {{Right}}.stream.setIntegration("Falling");
    {{Right}}.loadROM("/roms/.all/Falling.neees", "stream");
  messages:
  - no ganas...
  - bueno, digamos que ganas si llegas a 30 puntos
  - 👀
  events:
  - falling-end [finish]

finish:
  run: |
    const directory = `${Drive.ROMS_DIR}`;
    filesystem.mkdirp(directory);

    ["Falling.neees", "Thwaite.neees"].forEach((file) => {
      filesystem.cp(`${Drive.ALLROMS_DIR}/${file}`, `${directory}/${file}`);
    });
  messages:
  - cómo hiciste... eso...
  - ok
  - "<! ROM recibida: 📄  /roms/Falling.neees"
  - como prometí, puse la ROM en tu directorio 📁  ~/roms~
  - "<! ROM recibida: 📄  /roms/Thwaite.neees"
  - también envié otro juego del mismo autor llamado 🌳 🏠  ~Thwaite~
  - ¡chau por ahora!
  responses:
  - ▶️  continuar [end]

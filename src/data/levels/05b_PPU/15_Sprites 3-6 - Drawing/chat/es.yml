whymod8:
  messages:
  - ¡para soportar correctamente sprites de ~8x16~!
  - cuando el modo ~8x16~ se configura mediante 🎛️  PPUCtrl, cada sprite usa dos tiles apilados verticalmente
  - por ejemplo, ~y=10~ en un sprite ~8x16~ significa ~y=2~ de su segundo tile
  responses:
  - ...exercise


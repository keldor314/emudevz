main:
  messages:
  - since we already know which sprites we need to draw and how to render tiles,
  - drawing sprites will be fairly <easy>
  - |-
    our method to render a single 🌠  scanline will look like this:
      ```javascript
      renderScanline() {
        const sprites = this._evaluate();
        this._render(sprites); // we need to define this!
      }```
  responses:
  - easy... huh? [exercise]

exercise:
  messages:
  - we're gonna do the following
  - |-
      📚  in the 🖥️  `PPU` class, <change>:
      **_onVisibleLine()**:
        **->** just below the `renderScanline()` call to `backgroundRenderer`...
        **->** ...do the same with `spriteRenderer`
  - |-
      📚  and now, implement these methods in 🛸  `SpriteRenderer`:
      **renderScanline()**:
        **->** use the code from my previous message!
      **_render(sprites)**:
        **->** determine the y coordinate:
          ```javascript this.ppu.scanline;```
          (let's call this `y`)
        **->** for each `sprite` in `sprites`:
          **->** calculates the "inside" Y coordinate:
            ```javascript sprite.diffY(y)```
            (let's call this `insideY`)
          **->** instantiates a 🕊️  `Tile` passing the ppu, the pattern table id, the tile id, and `insideY % 8`
            (let's call this `tile`)
          **->** creates an array with the 4 palette colors of ```javascript sprite.paletteId```
            (let's call this `paletteColors`)
          **->** ```javascript for (let insideX = 0; insideX < 8; insideX++)```:
            **->** retrieves the color index for this pixel using ```javascript tile.getColorIndex(insideX)```
              (let's call this `colorIndex`)
            **->** if ```javascript colorIndex > 0``` (meaning, the pixel is not transparent):
              **->** calls ```javascript this.ppu.plot(...)``` to draw the pixel
  responses:
  - (*) what pattern table should I use? [patterntable]
  - (*) what tile id should I use? [tileid]
  - (*) why ~insideY % 8~? [whymod8]
  - (*) how can I get the palette colors? [palette]
  - (*) what ~X~ and ~Y~ should I use when plotting pixels? [coordinates]
  - (*) what color should I use when plotting pixels? [color]

patterntable:
  messages:
  - ask the sprite!
  - "```javascript sprite.patternTableId```"
  responses:
  - ...exercise

tileid:
  messages:
  - the sprite knows!
  - "```javascript sprite.tileIdFor(insideY)```"
  responses:
  - ...exercise

whymod8:
  messages:
  - to properly support ~8x16~ sprites!
  - when the ~8x16~ mode is set via 🎛️  PPUCtrl, each sprite uses two tiles stacked vertically
  - so, for example, ~y=10~ in a ~8x16~ sprite, means ~y=2~ of its second tile
  responses:
  - ...exercise

palette:
  messages:
  - |-
    you can get, for example, <color 2> by using:
    ```javascript this.ppu.getColor(sprite.paletteId, 2)```
  responses:
  - ...exercise

coordinates:
  messages:
  - the ~x~ position should be ```javascript sprite.x + insideX```
  - the ~y~ position should be the current scanline
  responses:
  - ...exercise

color:
  messages:
  - accessing `paletteColors` with the `colorIndex` will give you the ~color~
  responses:
  - ...exercise

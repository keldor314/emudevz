backdrop:
  messages:
  - puedes pensar en ello como un color de fondo universal
  - está definido en ~paleta 0, índice 0~ (también conocido como $PPU $3F00)
  - cualquier píxel del fondo con índice de color 0 muestra este color
  responses:
  - ...main
